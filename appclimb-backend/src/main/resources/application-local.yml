spring:
  datasource:
    url: jdbc:h2:mem:appclimb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

jwt:
  secret: appclimb-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 3600000
  refresh-token-expiration: 2592000000

server:
  address: 0.0.0.0
  port: ${PORT:8080}

app:
  bootstrap:
    admin-email: admin@appclimb.local
    admin-password: admin1234
    admin-nickname: admin
