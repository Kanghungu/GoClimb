services:
  - type: web
    name: appclimb-backend
    runtime: java
    plan: free
    buildCommand: ./gradlew bootJar
    startCommand: java -jar build/libs/appclimb-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://db.ngfuwuiewhjubridtqnt.supabase.co:5432/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false   # Render 대시보드에서 직접 입력
      - key: JWT_SECRET
        sync: false   # Render 대시보드에서 직접 입력
