services:
  - type: web
    name: appclimb-backend
    runtime: java
    plan: free
    buildCommand: gradle bootJar
    startCommand: java -jar build/libs/appclimb-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/gyms
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://db.ngfuwuiewhjubridtqnt.supabase.co:5432/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
